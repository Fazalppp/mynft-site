<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTNFT Wallet</title>
<style>
body{margin:0;font-family:sans-serif;background:#0b0f2a;color:#fff}
.header{display:flex;justify-content:space-between;padding:15px;font-weight:bold}
.logo{color:#00e0ff}
.card{background:#fff;color:#000;margin:15px;border-radius:15px;padding:15px}
.footer{position:fixed;bottom:0;width:100%;background:#fff;color:#000;display:flex;justify-content:space-around;padding:10px;border-radius:20px 20px 0 0}
</style>
</head>
<body>

<div class="header">
<div class="logo">HOTNFT.xyz</div>
<div>☰</div>
</div>

<div class="card">
<h3>Wallet Balance</h3>
<p>0 USDT</p>
</div>

<div class="card">
<h3>My Orders</h3>
<p>All Orders | Open | Purchased | Sold</p>
<div style="display:flex;justify-content:space-around">
<span>My NFTs</span>
<span>Profit</span>
<span>Deposit</span>
<span>Withdraw</span>
</div>
</div>

<div class="card">
<h3>My Team</h3>
<p>A Tier: 0 | B+C Tier: 0</p>
<div style="display:flex;justify-content:space-around">
<span>Members</span>
<span>Contribution</span>
<span>Orders</span>
<span>Share</span>
</div>
</div>

<div class="card">
<h3>Other Functions</h3>
</div>

<div class="footer">
<span>Stake</span>
<span>Earn</span>
<span>Reserve</span>
<span>Assets</span>
<span>My</span>
</div>

</body>
</html>
