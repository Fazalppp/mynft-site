<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA NFT - Auth</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #070b2d;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .box {
      width: min(360px, 88vw);
      padding: 24px;
      border-radius: 22px;
      background: #12183a;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }
    h2 {
      margin: 0 0 20px 0;
      font-size: 32px;
    }
    input {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 14px;
      border: none;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 16px;
      margin-top: 14px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #9b00a8, #23dce7);
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .google {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .msg {
      margin-top: 16px;
      min-height: 28px;
      color: #ff6b6b;
      word-break: break-word;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Account</h2>

    <input type="email" id="email" placeholder="Enter email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="signup()">Create Account</button>
    <button class="google" onclick="googleLogin()">Continue with Google</button>

    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBuLaKo8Rpk80hkxCzIxxZAjmXEoWGxP5s",
      authDomain: "mynft-xyz.firebaseapp.com",
      projectId: "mynft-xyz",
      storageBucket: "mynft-xyz.firebasestorage.app",
      messagingSenderId: "1063944131356",
      appId: "1:1063944131356:web:94d1ca2895d10b887da0d9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const msg = document.getElementById("msg");

    function showMessage(text, ok = false) {
      msg.textContent = text;
      msg.style.color = ok ? "#7CFC98" : "#ff6b6b";
    }

    window.onload = async () => {
      try {
        const result = await getRedirectResult(auth);
        if (result && result.user) {
          showMessage("Google Login Success ✅", true);
          setTimeout(() => {
            window.location.href = "home.html";
          }, 1000);
        }
      } catch (error) {
        if (error?.message) showMessage(error.message);
      }
    };

    window.signup = async () => {
      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!email || !password) {
          showMessage("Email aur password likho.");
          return;
        }

        await createUserWithEmailAndPassword(auth, email, password);
        showMessage("Account Created Successfully ✅", true);

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1000);
      } catch (e) {
        showMessage(e.message);
      }
    };

    window.googleLogin = async () => {
      try {
        await signInWithRedirect(auth, provider);
      } catch (e) {
        showMessage(e.message);
      }
    };
  </script>
</body>
</html>
