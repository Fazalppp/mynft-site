<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA NFT</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f2a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      width: 320px;
      padding: 20px;
      border-radius: 15px;
      background: #12172e;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.25);
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(90deg, purple, cyan);
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .google {
      background: transparent;
      border: 1px solid #444;
    }
    .msg {
      margin-top: 14px;
      color: #ff6b6b;
      word-break: break-word;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Account</h2>

    <input type="email" id="email" placeholder="Enter email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="signup()">Create Account</button>
    <button class="google" onclick="googleLogin()">Continue with Google</button>

    <div class="msg" id="error"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBuLaKo8Rpk80hkxCzIxxZAjmXEoWGxP5s",
      authDomain: "mynft-xyz.firebaseapp.com",
      projectId: "mynft-xyz",
      storageBucket: "mynft-xyz.firebasestorage.app",
      messagingSenderId: "1063944131356",
      appId: "1:1063944131356:web:94d1ca2895d10b887da0d9",
      measurementId: "G-MKQNM5NPZT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const errorBox = document.getElementById("error");

    function showMessage(text, ok = false) {
      errorBox.textContent = text;
      errorBox.style.color = ok ? "#7CFC98" : "#ff6b6b";
    }

    window.signup = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showMessage("Email aur password likho.");
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        showMessage("Account Created Successfully ✅", true);
      } catch (e) {
        showMessage("Firebase: " + e.message);
      }
    };

    window.googleLogin = async () => {
      try {
        await signInWithRedirect(auth, provider);
      } catch (e) {
        showMessage("Firebase: " + e.message);
      }
    };

    getRedirectResult(auth)
      .then((result) => {
        if (result && result.user) {
          showMessage("Google Login Success: " + result.user.email, true);
        }
      })
      .catch((error) => {
        if (error) {
          showMessage("Firebase: " + error.message);
        }
      });
  </script>
</body>
</html>
